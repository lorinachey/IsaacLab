# Conda environment for the rad-rl-project demo-collection stack.
#
# Prerequisites
# -------------
#   - NVIDIA GPU with CUDA 12.8-compatible driver (≥ 525.85)
#   - Ubuntu 22.04 (the isaacsim pip wheels are Linux-only)
#   - For Xbox controller support: add your user to the 'input' group
#       sudo usermod -aG input $USER   # then log out and back in
#
# Create & activate
# -----------------
#   conda env create -f environment.yml
#   conda activate isaaclab
#
# Install IsaacLab from source (required — not on PyPI)
# -------------------------------------------------------
#   cd <IsaacLab-repo-root>
#   ./isaaclab.sh --install          # installs isaaclab, isaaclab_rl,
#                                    # isaaclab_tasks, isaaclab_assets

# Workflow to create the environment and install the dependencies
# conda env create -f scripts/rad-rl-project/environment.yml
# conda activate isaaclab
# cd <IsaacLab-repo-root>
# ./isaaclab.sh --install
# # add to input group for controller
# sudo usermod -aG input $USER && newgrp input
#
# NOTE: The isaacsim-* packages are served from NVIDIA's private pip index
# (https://pypi.nvidia.com).  The --extra-index-url entries below tell pip
# where to find them; conda passes these through to pip during env creation.

name: isaaclab

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  - pip:
    # ── Extra pip indexes ──────────────────────────────────────────────────────
    - --extra-index-url https://pypi.nvidia.com
    - --extra-index-url https://download.pytorch.org/whl/cu128

    # ── Isaac Sim 5.1.0 (NVIDIA pip index) ───────────────────────────────────
